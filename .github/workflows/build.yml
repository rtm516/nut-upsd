name: Build Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
  schedule:
    # Check for new releases daily
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      nut_version:
        description: "NUT version override"
        required: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve NUT version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.nut_version }}" ]; then
            VERSION="${{ github.event.inputs.nut_version }}"
            echo "Using manual override: $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch latest release tag from NUT repo
          LATEST=$(gh api repos/networkupstools/nut/releases/latest --jq '.tag_name' | sed 's/^v//')
          echo "Latest NUT release: $LATEST"
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

          # Read last built version from repo variable
          LAST_BUILT=$(gh api "repos/${{ github.repository }}/actions/variables/LAST_BUILT_NUT_VERSION" --jq '.value' 2>/dev/null || echo "")
          echo "Last built: ${LAST_BUILT:-<none>}"

          if [ "$LATEST" != "$LAST_BUILT" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "New version detected or push trigger — will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Already up to date ($LAST_BUILT)"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write

    steps:
      - uses: actions/checkout@v6
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NUT_VERSION=${{ needs.check-release.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-release.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update repo variable with built version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set LAST_BUILT_NUT_VERSION --body "${{ needs.check-release.outputs.version }}"
          echo "Stored LAST_BUILT_NUT_VERSION=${{ needs.check-release.outputs.version }}"
      
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.check-release.outputs.version }}
          name: NUT ${{ needs.check-release.outputs.version }}
          body: |
            Automated build of NUT v${{ needs.check-release.outputs.version }}
            
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-release.outputs.version }}
            ```
          makeLatest: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

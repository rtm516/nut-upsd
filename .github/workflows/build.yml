name: Build Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
  schedule:
    # Check for new releases daily
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      nut_version:
        description: "NUT version override"
        required: false
      force:
        description: "Force rebuild even if tag exists"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve NUT version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.nut_version }}
          FORCE: ${{ github.event.inputs.force }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          VERSION="${INPUT_VERSION:-$(gh api repos/networkupstools/nut/releases/latest --jq '.tag_name' | sed 's/^v//')}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" = "push" ] || [ "$FORCE" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif docker manifest inspect "$REGISTRY/$IMAGE_NAME:$VERSION" > /dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NUT_VERSION=${{ needs.check-release.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-release.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.check-release.outputs.version }}
          name: NUT ${{ needs.check-release.outputs.version }}
          body: |
            Automated build of NUT v${{ needs.check-release.outputs.version }}

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-release.outputs.version }}
            ```
          makeLatest: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
